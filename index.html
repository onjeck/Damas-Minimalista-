<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Damas Minimalista</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              primary: '#10b981', // emerald-500
              secondary: '#34d399', // emerald-400
              accent: '#f59e0b', // amber-500
              dark: '#064e3b', // emerald-900
              light: '#ecfdf5', // emerald-50
            },
            boxShadow: {
              'board': '0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04), 0 -2px 6px rgba(0,0,0,0.1) inset',
              'piece': '0 4px 6px -1px rgba(0, 0, 0, 0.3), 0 2px 4px -1px rgba(0, 0, 0, 0.06), inset 0 2px 4px rgba(255,255,255,0.3)',
            },
            keyframes: {
              capture: {
                '0%': { transform: 'scale(1)', opacity: '1' },
                '50%': { transform: 'scale(1.1)', opacity: '0.8' },
                '100%': { transform: 'scale(0.5)', opacity: '0' },
              },
              capture3d: {
                '0%': { transform: 'translateZ(0) scale(1) rotateZ(0deg)', opacity: '1' },
                '40%': { transform: 'translateZ(60px) scale(1.1) rotateZ(20deg) rotateX(20deg)', opacity: '1' },
                '100%': { transform: 'translateZ(100px) scale(0) rotateZ(90deg) rotateX(45deg)', opacity: '0' },
              },
              urgent: {
                '0%, 100%': { transform: 'scale(1)' },
                '50%': { transform: 'scale(1.15)' },
              },
              float: {
                '0%, 100%': { transform: 'translateZ(0px)' },
                '50%': { transform: 'translateZ(8px)' }, // Float up
              },
              shadowPulse: {
                '0%, 100%': { opacity: '0.4', transform: 'scale(1)' },
                '50%': { opacity: '0.2', transform: 'scale(0.85)' },
              },
              // Background Animations
              gridMove: {
                '0%': { transform: 'translateY(0)' },
                '100%': { transform: 'translateY(40px)' },
              },
              gradientFlow: {
                '0%': { backgroundPosition: '0% 50%' },
                '50%': { backgroundPosition: '100% 50%' },
                '100%': { backgroundPosition: '0% 50%' },
              },
              drift: {
                '0%': { transform: 'translate(0, 0)' },
                '50%': { transform: 'translate(20px, -20px)' },
                '100%': { transform: 'translate(0, 0)' },
              },
              tumble: {
                '0%': { transform: 'translate(0, 0) rotate(0deg)' },
                '33%': { transform: 'translate(30px, -50px) rotate(10deg)' },
                '66%': { transform: 'translate(-20px, 20px) rotate(-5deg)' },
                '100%': { transform: 'translate(0, 0) rotate(0deg)' },
              },
              // Arcade Text Animations
              'arcade-zoom': {
                '0%': { transform: 'scale(0) rotate(-10deg)', opacity: '0' },
                '60%': { transform: 'scale(1.2) rotate(0deg)', opacity: '1' },
                '100%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
              },
              'arcade-flash': {
                '0%, 100%': { filter: 'brightness(100%)' },
                '50%': { filter: 'brightness(200%) drop-shadow(0 0 10px white)' },
              },
              'health-damage': {
                '0%': { width: 'var(--prev-width)' },
                '100%': { width: 'var(--new-width)' }
              },
              // Crown Light Trace Animation
              'trace': {
                '0%': { strokeDashoffset: '80' },
                '100%': { strokeDashoffset: '-80' },
              },
              // Capture Effects
              'lightning-flash': {
                '0%': { opacity: '0', transform: 'scale(1)' },
                '10%': { opacity: '1', transform: 'scale(1.2)' },
                '20%': { opacity: '0.8', transform: 'scale(0.9)' },
                '40%': { opacity: '1', transform: 'scale(1.1)' },
                '100%': { opacity: '0', transform: 'scale(0)' },
              },
              'abduction-beam': {
                '0%': { height: '0%', opacity: '0' },
                '20%': { height: '100%', opacity: '0.8' },
                '80%': { height: '100%', opacity: '0.8' },
                '100%': { height: '0%', opacity: '0' },
              },
              'abduction-float': {
                '0%': { transform: 'translateY(0) scale(1)', opacity: '1' },
                '100%': { transform: 'translateY(-100px) scale(0.5)', opacity: '0' },
              },
              'ghost-rise': {
                '0%': { transform: 'translateY(0) scale(1)', opacity: '0.8', filter: 'blur(0px)' },
                '100%': { transform: 'translateY(-60px) scale(1.2)', opacity: '0', filter: 'blur(4px)' },
              },
              'explosion-expand': {
                '0%': { transform: 'scale(0)', opacity: '1' },
                '50%': { transform: 'scale(1.5)', opacity: '0.8' },
                '100%': { transform: 'scale(2)', opacity: '0' },
              },
              'blackhole-implode': {
                '0%': { transform: 'scale(1) rotate(0deg)', opacity: '1' },
                '50%': { transform: 'scale(0.1) rotate(720deg)', opacity: '0.5' },
                '100%': { transform: 'scale(0) rotate(1080deg)', opacity: '0' },
              },
              'tornado-spin': {
                '0%': { transform: 'translateY(0) rotate(0deg) scale(1)', opacity: '1' },
                '100%': { transform: 'translateY(-150px) rotate(1080deg) scale(0.2)', opacity: '0' },
              },
              // Game Juice: Screen Shake
              shake: {
                '0%, 100%': { transform: 'translateX(0)' },
                '10%, 30%, 50%, 70%, 90%': { transform: 'translateX(-4px) rotate(-1deg)' },
                '20%, 40%, 60%, 80%': { transform: 'translateX(4px) rotate(1deg)' },
              },
              // Game Juice: Particles
              particle: {
                '0%': { transform: 'translate(0, 0) scale(1)', opacity: '1' },
                '100%': { transform: 'translate(var(--tx), var(--ty)) scale(0)', opacity: '0' },
              },
              'spin-reverse': {
                '0%': { transform: 'rotate(0deg)' },
                '100%': { transform: 'rotate(-360deg)' },
              },
              'float-up': {
                '0%': { transform: 'translateY(0) scale(0.5)', opacity: '0' },
                '50%': { opacity: '1' },
                '100%': { transform: 'translateY(-50px) scale(1.5)', opacity: '0' },
              },
              twinkle: {
                '0%, 100%': { opacity: '1', transform: 'scale(1)' },
                '50%': { opacity: '0.3', transform: 'scale(0.8)' },
              },
              rise: {
                '0%': { transform: 'translateY(0) scale(1)', opacity: '0' },
                '50%': { opacity: '1' },
                '100%': { transform: 'translateY(-100vh) scale(1.5)', opacity: '0' },
              }
            },
            animation: {
              urgent: 'urgent 0.6s ease-in-out infinite',
              float: 'float 3s ease-in-out infinite',
              shadowPulse: 'shadowPulse 3s ease-in-out infinite',
              gridMove: 'gridMove 2s linear infinite',
              gradientFlow: 'gradientFlow 15s ease infinite',
              drift: 'drift 20s ease-in-out infinite',
              tumble: 'tumble 15s ease-in-out infinite',
              'arcade-in': 'arcade-zoom 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
              'arcade-pulse': 'arcade-flash 0.2s ease-in-out',
              'crown-trace': 'trace 3s linear infinite',
              'shake': 'shake 0.4s cubic-bezier(.36,.07,.19,.97) both',
              'particle': 'particle 0.6s ease-out forwards',
              'lightning': 'lightning-flash 0.5s ease-out forwards',
              'abduction-beam': 'abduction-beam 1.5s ease-in-out forwards',
              'abduction-float': 'abduction-float 1.5s ease-in-out forwards',
              'ghost-rise': 'ghost-rise 1.5s ease-out forwards',
              'explosion': 'explosion-expand 0.5s ease-out forwards',
              'blackhole': 'blackhole-implode 0.8s ease-in forwards',
              'tornado': 'tornado-spin 1s ease-in forwards',
              'spin-slow': 'spin 3s linear infinite',
              'spin-reverse': 'spin-reverse 3s linear infinite',
              'float-up': 'float-up 2s ease-out forwards',
              'twinkle': 'twinkle 3s ease-in-out infinite',
              'rise': 'rise 10s linear infinite',
            }
          }
        }
      }
    </script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=Black+Ops+One&display=swap');
      body {
        font-family: 'Inter', sans-serif;
        background-color: #f0fdf4; /* emerald-50 */
      }
      .font-arcade {
        font-family: 'Black Ops One', system-ui;
        letter-spacing: 0.1em;
      }
      .perspective-container {
        perspective: 1000px;
      }
      .text-stroke {
        -webkit-text-stroke: 2px black;
      }
      .text-stroke-sm {
        -webkit-text-stroke: 1px black;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
